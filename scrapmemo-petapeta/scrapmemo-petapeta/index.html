// ══════════════════════════════════════════
//  SAVE / LOAD
// ══════════════════════════════════════════
function savePage() { touchPage(); save(); toast('保存しました ✓'); }
function save() {
  try {
    localStorage.setItem('snb6p',JSON.stringify(pages));
    localStorage.setItem('snb6i',curIdx);
    localStorage.setItem('snb6trash',JSON.stringify(trash));
  } catch(e){}
}
function load() {
  try {
    const r=localStorage.getItem('snb6p');
    if (r){
      pages=JSON.parse(r); curIdx=+localStorage.getItem('snb6i')||0;
      if(curIdx>=pages.length)curIdx=0;
      const t=localStorage.getItem('snb6trash');
      if(t) trash=JSON.parse(t);
      purgeTrashed();
      return true;
    }
  } catch(e){}
  return false;
}
function purgeTrashed() {
  const cutoff=new Date(Date.now()-30*86400000).toISOString();
  trash=trash.filter(t=>t.deletedAt>cutoff);
}
function moveToTrash(el) {
  trash.push({
    id:nid(),
    element:JSON.parse(JSON.stringify(el)),
    deletedAt:nowS(),
    fromPageId:pages[curIdx].id,
    fromPageTitle:pages[curIdx].title||`ページ ${curIdx+1}`
  });
  pages[curIdx].elements=pages[curIdx].elements.filter(x=>x.id!==el.id);
  purgeTrashed(); save();
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ══════════════════════════════════════════
//  SOUND EFFECTS  (Web Audio API)
// ══════════════════════════════════════════
let _ac=null;
function _getAC(){
  if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended') _ac.resume();
  return _ac;
}
function _noise(ac,dur){
  const b=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate);
  const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const s=ac.createBufferSource(); s.buffer=b; return s;
}
function soundPeta(){try{
  const ac=_getAC(),t=ac.currentTime;
  // cute soft pop: quick sine blip
  const o=ac.createOscillator(); o.type='sine';
  const g=ac.createGain();
  o.frequency.setValueAtTime(520,t); o.frequency.exponentialRampToValueAtTime(280,t+.06);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.18,t+.008);
  g.gain.exponentialRampToValueAtTime(.001,t+.09);
  o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.09);
  // soft paper rustle accent
  const n=_noise(ac,.05); const f=ac.createBiquadFilter(); const gn=ac.createGain();
  f.type='highpass'; f.frequency.value=2000;
  gn.gain.setValueAtTime(.07,t); gn.gain.exponentialRampToValueAtTime(.001,t+.05);
  n.connect(f); f.connect(gn); gn.connect(ac.destination); n.start(t);
}catch(e){}}
function soundFlip(){try{
  const ac=_getAC(),t=ac.currentTime,dur=.38;
  // gentle paper whoosh: two layers
  const n1=_noise(ac,dur); const f1=ac.createBiquadFilter(); const g1=ac.createGain();
  f1.type='bandpass'; f1.frequency.setValueAtTime(800,t); f1.frequency.exponentialRampToValueAtTime(200,t+dur); f1.Q.value=.6;
  g1.gain.setValueAtTime(0,t); g1.gain.linearRampToValueAtTime(.07,t+.03); g1.gain.exponentialRampToValueAtTime(.001,t+dur);
  n1.connect(f1); f1.connect(g1); g1.connect(ac.destination); n1.start(t);
  const n2=_noise(ac,.12); const f2=ac.createBiquadFilter(); const g2=ac.createGain();
  f2.type='highpass'; f2.frequency.value=3000;
  g2.gain.setValueAtTime(.04,t); g2.gain.exponentialRampToValueAtTime(.001,t+.12);
  n2.connect(f2); f2.connect(g2); g2.connect(ac.destination); n2.start(t);
}catch(e){}}
function soundTrash(){try{
  const ac=_getAC(),t=ac.currentTime,dur=.18;
  const n=_noise(ac,dur); const f=ac.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=600;
  const g=ac.createGain();
  g.gain.setValueAtTime(.3,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
  n.connect(f); f.connect(g); g.connect(ac.destination); n.start(t);
  // rumble
  const o=ac.createOscillator(); o.type='sine'; const g2=ac.createGain();
  o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(30,t+.12);
  g2.gain.setValueAtTime(.2,t); g2.gain.exponentialRampToValueAtTime(.001,t+.12);
  o.connect(g2); g2.connect(ac.destination); o.start(t); o.stop(t+.12);
}catch(e){}}
function soundFetch(){try{
  const ac=_getAC(),t=ac.currentTime;
  [[880,.0],[1320,.1]].forEach(([freq,delay])=>{
    const o=ac.createOscillator(); o.type='sine'; const g=ac.createGain();
    o.frequency.value=freq;
    g.gain.setValueAtTime(0,t+delay); g.gain.linearRampToValueAtTime(.12,t+delay+.01);
    g.gain.exponentialRampToValueAtTime(.001,t+delay+.28);
    o.connect(g); g.connect(ac.destination); o.start(t+delay); o.stop(t+delay+.3);
  });
}catch(e){}}

// ══════════════════════════════════════════
//  KEYBOARD (PC)
// ══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const inInput=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
  if (!inInput) {
    if (e.key==='ArrowRight') goNext();
    if (e.key==='ArrowLeft')  goPrev();
    if ((e.key==='Delete'||e.key==='Backspace')&&selEl) {
      const elData=pages[curIdx].elements.find(x=>x.id===selEl.dataset.id);
      if(elData) moveToTrash(elData);
      selEl.remove(); selEl=null; touchPage(); toast('ゴミ箱に移動しました 🗑️');
    }
  }
  if (e.key==='Escape') { closeTitle(); closeSort(); closeMemo(); closeWCSheet(); closeTodo(); closeSearch(); closeSettings(); }
});
document.getElementById('title-in').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmTitle(); });
document.getElementById('wc-url-input').addEventListener('keydown',e=>{ if(e.key==='Enter') doFetchOGP(); });
document.getElementById('todo-title-in').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); const inp=document.querySelector('#todo-editor .block-check-text'); if(inp) inp.focus(); }
});

document.getElementById('page-wrap').addEventListener('pointerdown',e=>{
  if (!e.target.closest('.scrap')&&selEl) selEl=null;
});

setInterval(save,60000);

// ── CHROME拡張機能からのクリップ受信 ──
window.addEventListener('petapeta-clip', e => {
  const { type, content, sourceUrl } = e.detail;
  const el = {
    id: nid(), type: 'memo',
    x: Math.floor(Math.random()*100+16),
    y: Math.floor(Math.random()*80+16),
    w: 300, rot: randRot(), sourceUrl: sourceUrl||'', deco: randDeco(),
    blocks: type === 'image'
      ? [{ id: nid(), type: 'image', src: content, caption: '' }]
      : [{ id: nid(), type: 'text', content: content||'' }]
  };
  pages[curIdx].elements.push(el);
  const cv = document.getElementById('canvas');
  if (cv) { cv.querySelector('.empty-hint')?.remove(); drawScrap(el, cv); }
  soundPeta(); touchPage(); save();
  toast(type === 'image' ? '画像をクリップしました 📷' : 'テキストをクリップしました ✓');
});

if (savedTheme) { document.body.classList.remove('t-cork'); document.body.classList.add(savedTheme); currentTheme=savedTheme; }

if (savedRot) memoRotMode=savedRot;
const savedEd = localStorage.getItem('snb6ed');
if (savedEd==='light') document.body.classList.add('ed-light');
if (!load()) pages=mkData();
renderPage();
</script>
